<!DOCTYPE html>

<head>

<title>TRAE Work</title>
<style>
*{
margin: 0;
padding: 0;

}body{

nav{

justify-content: space-between;

 margin-bottom: 8px;}
 .main-text{

.input-box{

border-radius: 6px;  
padding: 15px;   
margin-bottom: 25px;}textarea{ 
width: 100%;   
height: 110px;  
background: transparent;

.icon-row{
display: flex;  
justify-content:
space-between; 
align-items: center;

.left-group{   
display: flex;  
gap: 22px;  
font-size: 22px;}
.right-group{ 
display: flex;
