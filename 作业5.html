<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网上书城-注册</title>
    <style>
        .wrap{
            width: 570px;
            margin: 30px auto;
            border: 4px solid #ffffff;
            background: #e0dfdf; 
            padding: 20px;
        }
        .inner-box{
            border: 5px solid #ffffff;
            padding: 0;
        }
        .title1{
            background-color: #3a3939;
            color: #fff;
            text-align: center;
            font-size: 26px;
            letter-spacing: 11px; 
            padding: 12px 0;
        }
        .title2{
            padding: 10px 30px;
            font-size: 20px;
            background: linear-gradient(#efefef,#cccccc);
        }
        table{
            border-collapse: collapse;
            width: 100%;
        }
        td{
            padding: 9px;
            text-align: center;
        }
        input{
            width: 340px;
            height: 30px;
            border: 1px solid #707070;
        }
        button{
            width: 340px;
            height: 36px;
            background-color: #464646;
            color: #fff;
            border: none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title1">网上书城</div>
        <div class="inner-box">
            <div class="title2">➕ 注册新用户</div>
            <table>
                <tr>
                    <td><input type="text" placeholder="👤用户名"></td>
                </tr>
                <tr>
                    <td><input type="password" placeholder="🔑密码"></td>
                </tr>
                <tr>
                    <td><input type="password" placeholder="🔑确认密码"></td>
                </tr>
                <tr>
                    <td><input type="email" placeholder="📩电子邮件"></td>
                </tr>
                <tr>
                    <td><button>注册新用户</button></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
