<!DOCTYPE html>
<html lang="en">
<head>

    <title>如何培养认真严谨的习惯</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
          body {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        }
        .img-box img {
            width: 100%;
            height: auto;
            display: block;
        }

            flex: 1;

            height: 100%;
        }

            text-align: center;
            margin-bottom: 15px;
            margin-top: 50px;
        }
        .title h1 {
            font-size: 20px;

            margin-bottom: 8px;
        }

            font-size: 12px;
            color: #666;
        }
        .content {
            font-size: 14px;
            color: #333;

            padding-left: 20px;
        }
        .a{
            color: aqua;
        }
        .b{
            color: red;
        }
        .title h1 {
        font-size: 45px;
        font-family: "SimSun", "STSong", serif;
        font-weight: bold;
        letter-spacing: 3px;

        margin-bottom: 8px;
}

<body>
     <div class="wrap">
        <div class="img-box">
            <img src="态度.jpg" alt="态度决定一切 细节决定成败">
        </div>
        <div class="text-box">
            <div class="title">
                <h1>如何培养<span style="color: blue;">认真严谨</span>的习惯</h1>
        <div class="meta">
            <p>时间：<span class="a">2022年02月21日 17:29 </span>
                来源：<span class="a">思想教育</span>
            </p>
            </div>
        </div>
        <ul class="content">
                <li><span class="b">反复确认</span>做任何事情都要照顾到每一个细节并反复确认<span class="b">要有一种能在脑子里“虚拟”整个事件过程的能力</span>确保所有节点都正常</li>
                <li>想尽办法<span class="b">努力让不可能变成可能</span>只有佣金全力做了，才算是努力</li>
                <li>结果导向<span class="b">一切以结果为导向，任何事情都是你的名片。</span>还要思考你的结果和过程是满足所有和你配合的人的需求</li>
                <li>会假设<span class="b">了解同围比你强的人，观家他们的做事方法。</span>遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做</li>
            </ul>
        </div>
    </div>
