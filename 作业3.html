<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CSS美化作业</title>
    <style>
        *{margin: 0; padding: 0;}

         body {
      margin: 0;
      min-height: 100vh;

      background: linear-gradient(135deg, #513570, #a06090);
    }
        .bg-video{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .play-card {
            width: 350px;
            height: 350px;
            background: rgba(123, 75, 123, 0.75);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .player-box {
            width: 260px;
            height: 200px;
            background: #221a27;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player-inner {
            width: 220px;
            height: 160px;
            background: #a85b6b;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .play-btn {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .play-icon {
            width: 0;
            height: 0;
            border-top: 22px solid transparent;
            border-bottom: 22px solid transparent;
            border-left: 35px solid #221a27;
            margin-left: 5px;
        }
        .play-btn:hover{
            transform: scale(1.08);
        }
    </style>
</head>
<body>
<video class="bg-video" autoplay loop muted>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-sunset-over-water-reflections-2217-large.mp4">
</video>


<div class="play-card">
    <div class="player-box">
        <div class="player-inner">
            <div class="play-btn">
                <div class="play-icon"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
